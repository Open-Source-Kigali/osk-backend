name: Bug report
description: Report something that isn't working
title: "fix: <short description>"
labels: ["bug", "needs-triage"]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: How can we reproduce it?
      description: List the steps to see the bug yourself.
      placeholder: |
        1. Start the server
        2. Send a request to ...
        3. See the error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: true

  - type: input
    id: environment
    attributes:
      label: Environment
      description: Node version and OS (run `node -v` if unsure).
      placeholder: Node 20.11, Ubuntu 24.04
