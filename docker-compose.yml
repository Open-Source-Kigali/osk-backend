services:
  postgres:
    image: postgres:16-alpine
    container_name: osk-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: osk
      POSTGRES_PASSWORD: osk
      POSTGRES_DB: oskbackend
    ports:
      - "3003:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
